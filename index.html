<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر العلوم الذكي 🔬</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #eceff1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .lab-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 45px rgba(0,0,0,0.2); width: 850px; text-align: center; border: 6px solid #455a64; }
        
        .box-title { background: #37474f; color: white; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 18px; font-weight: bold; }
        .exp-container { display: flex; justify-content: space-around; align-items: flex-end; height: 320px; background: #fafafa; border-radius: 15px; padding: 20px; position: relative; border: 2px solid #cfd8dc; margin-bottom: 20px; }

        /* الكؤوس */
        .beaker { width: 115px; height: 150px; border: 4px solid #546e7a; border-top: none; border-radius: 0 0 25px 25px; position: relative; background: rgba(255,255,255,0.6); transition: 1s ease-in-out; }
        .liquid { position: absolute; bottom: 0; width: 100%; height: 0%; transition: 1.5s; border-radius: 0 0 20px 20px; }
        
        /* ورقة الترشيح (تم تغيير اللون للرمادي ليتضح الملح) */
        .filter-paper { 
            position: absolute; top: -55px; left: -15px; width: 145px; height: 65px; 
            background: #b0bec5; /* لون رمادي مزرق فاتح */
            border: 2px solid #78909c; 
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%); 
            display: none; z-index: 10; display: flex; align-items: center; justify-content: center; color: #263238; font-weight: bold; font-size: 13px; 
        }

        /* الملح المتجمع */
        .salt-pile { position: absolute; bottom: 5px; width: 40px; height: 20px; background: white; border-radius: 50% 50% 0 0; opacity: 0; transition: 1s; box-shadow: 0 0 5px #fff; }

        /* الغربال */
        .sieve-tool { width: 155px; height: 45px; background: #6d4c41; border: 4px solid #3e2723; position: absolute; top: -60px; left: -25px; display: none; z-index: 5; overflow: hidden; }
        .mesh { width: 100%; height: 100%; background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.2) 3px, rgba(255,255,255,0.2) 6px); }

        .lentil { position: absolute; width: 15px; height: 13px; background: #e64a19; border-radius: 50%; border: 1px solid #bf360c; }

        /* الأزرار */
        button { padding: 12px 22px; font-size: 15px; cursor: pointer; border-radius: 12px; border: none; color: white; font-weight: bold; margin: 6px; transition: 0.3s; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-mix { background: #fb8c00; }
        .btn-pour { background: #0288d1; }
        .btn-shake { background: #673ab7; display: none; }
        .btn-reset { background: #d32f2f; width: 100%; margin-top: 15px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(12px); }
            75% { transform: translateX(-12px); }
        }
    </style>
</head>
<body>

<div class="lab-card">
    <button style="background:#c2185b; width:100%" onclick="initAudio()">🔊 اضغطي هنا لتفعيل الصوت أولاً</button>

    <div class="box-title">1️⃣ فصل الملح عن الماء (الترشيح)</div>
    <div class="exp-container">
        <div id="beaker1" class="beaker">
            <div id="water1" class="liquid" style="background:#81d4fa; height:65%">
                <div id="saltInside" style="position:absolute; width:100%; height:100%; background-image:radial-gradient(#fff 25%, transparent 25%); background-size:12px 12px; opacity:0;"></div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:center;">
            <button class="btn-mix" onclick="mixSalt()">🌪️ اخلط الملح</button>
            <button class="btn-pour" id="pourBtn1" onclick="pourSalt()" disabled>💧 صب في المرشح</button>
        </div>

        <div id="beaker2" class="beaker">
            <div id="filterPaper" class="filter-paper" style="display:none">
                ورقة ترشيح 📄
                <div id="saltOnTop" class="salt-pile"></div>
            </div>
            <div id="water2" class="liquid" style="background:#0277bd;"></div>
        </div>
    </div>

    <div class="box-title" style="background:#4e342e">2️⃣ فصل الطحين عن العدس (الغربلة)</div>
    <div class="exp-container">
        <div id="beaker3" class="beaker">
            <div id="mix3" class="liquid" style="height:75%; background:#f5f5dc">
                <div class="lentil" style="top:15px; left:25px"></div>
                <div class="lentil" style="top:45px; right:20px"></div>
                <div class="lentil" style="bottom:25px; left:45px"></div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:center;">
            <button class="btn-pour" id="pourBtn2" onclick="pourSieve()">🧺 صب في الغربال</button>
            <button class="btn-shake" id="shakeBtn" onclick="shakeSieve()">👋 هز الغربال للفصل</button>
        </div>

        <div id="beaker4" class="beaker">
            <div id="sieveTool" class="sieve-tool"><div class="mesh"></div></div>
            <div id="flourBottom" class="liquid" style="background:#f5f5dc"></div>
        </div>
    </div>

    <button class="btn-reset" onclick="location.reload()">🔄 إعادة المختبر بالكامل</button>
    <div id="status" style="margin-top:10px; font-weight:bold; color:#263238">جاهزة يا معلمتي؟ ابدأي بالخلط أولاً.</div>
</div>

<script>
    let audioCtx;
    let shakeCount = 0;

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        beep(440, 0.2);
        document.getElementById('status').innerText = "تم تفعيل الصوت! ✅";
    }

    function beep(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    // تجربة الملح
    function mixSalt() {
        beep(200, 0.3);
        document.getElementById('saltInside').style.opacity = "1";
        document.getElementById('filterPaper').style.display = "flex";
        document.getElementById('pourBtn1').disabled = false;
        document.getElementById('status').innerText = "تم خلط الملح! صبي المحلول في المرشح الرمادي.";
    }

    function pourSalt() {
        beep(300, 1.2);
        document.getElementById('beaker1').style.transform = "rotate(-45deg) translate(-70px, -90px)";
        setTimeout(() => {
            document.getElementById('water1').style.height = "0%";
            document.getElementById('water2').style.height = "65%";
            document.getElementById('saltOnTop').style.opacity = "1";
            document.getElementById('status').innerText = "رائع! الملح الأبيض واضح الآن فوق المرشح.";
            beep(600, 0.4);
        }, 1000);
    }

    // تجربة الغربلة
    function pourSieve() {
        beep(250, 0.8);
        document.getElementById('beaker3').style.transform = "rotate(-45deg) translate(-70px, -90px)";
        document.getElementById('sieveTool').style.display = "block";
        setTimeout(() => {
            document.getElementById('mix3').style.height = "0%";
            document.getElementById('pourBtn2').style.display = "none";
            document.getElementById('shakeBtn').style.display = "block";
            const sieve = document.getElementById('sieveTool');
            for(let i=0; i<6; i++) {
                let l = document.createElement('div');
                l.className = 'lentil';
                l.style.top = "12px"; l.style.left = (i*24 + 10) + "px";
                sieve.appendChild(l);
            }
            document.getElementById('status').innerText = "الخليط في الغربال.. اضغطي على زر (الهز) 5 مرات.";
        }, 1000);
    }

    function shakeSieve() {
        shakeCount++;
        beep(150, 0.1);
        const sieve = document.getElementById('sieveTool');
        sieve.style.animation = "shake 0.1s linear";
        setTimeout(() => sieve.style.animation = "", 100);

        if(shakeCount >= 5) {
            document.getElementById('flourBottom').style.height = "75%";
            document.getElementById('status').innerText = "تم الفصل! نزل الطحين البيج وبقي العدس بالغربال.";
            beep(800, 0.5);
            document.getElementById('shakeBtn').disabled = true;
        }
    }
</script>
</body>
</html>

github.com/amalalghoul2006-art/mixture-_lab-<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكاة فصل المخاليط - الصف الثالث</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f8ff; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; }
        .beaker { width: 150px; height: 180px; border: 3px solid #333; border-top: none; border-radius: 0 0 20px 20px; margin: 20px auto; position: relative; background: #eee; }
        .mixture { position: absolute; bottom: 0; width: 100%; height: 50px; background: #c2b280; border-radius: 0 0 17px 17px; } /* رمل */
        .salt { position: absolute; bottom: 10px; width: 100%; height: 5px; background: white; } /* ملح */
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; margin: 10px; }
        button:hover { background-color: #218838; }
        #status { font-weight: bold; color: #007bff; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>مختبر العلوم: فصل الملح عن الرمل</h1>
        <p>لدينا مخلوط من الرمل والملح، كيف نفصلهما؟</p>
        
        <div class="beaker" id="cup">
            <div class="mixture" id="sand"></div>
            <div class="salt" id="salt"></div>
        </div>

        <div id="controls">
            <button onclick="addWater()">1. أضف الماء (للإذابة)</button>
            <button onclick="filter()">2. استخدم المصفاة (الترشيح)</button>
        </div>

        <p id="status">اضغط على الخطوة الأولى للبدء!</p>
    </div>

    <script>
        function addWater() {
            document.getElementById('cup').style.background = "#add8e6"; // لون الماء
            document.getElementById('status').innerText = "الآن ذاب الملح في الماء، وبقي الرمل في القاع.";
        }

        function filter() {
            document.getElementById('sand').style.display = "none";
            document.getElementById('status').innerText = "أحسنت! تم فصل الرمل بواسطة الترشيح، وبقي الماء المملح.";
        }
    </script>

</body>
</html>
